<html lang="en">

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>WanderNest | Best Travel & Hotel Booking Website</title>

    <meta
      name="description"
      content="Book hotels, tours, and travel packages easily with WanderNest. Discover amazing destinations and affordable travel deals."

      content="travel, hotel booking, tour packages, flights, vacation, WanderNest"

      content="Book hotels and tours easily with WanderNest."
